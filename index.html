<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Diário de Robótica</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #e8dcc7, #cbb89d);
}

#home {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 20px;
  text-align: center;
  padding: 20px;
}

.descricao {
  max-width: 600px;
  font-size: 18px;
  color: #333;
  background: rgba(255,255,255,0.6);
  padding: 15px;
  border-radius: 20px;
  font-family: "Times New Roman", Times, serif;
}

.clique {
  font-size: 22px;
  font-weight: bold;
  color: #5a3722;
}

.seta {
  font-size: 30px;
  animation: bounce 1s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(10px); }
}

.caderno {
  width: 260px;
  height: 340px;
  background: linear-gradient(145deg, #6b3e26, #8b5e3c);
  border-radius: 15px;
  cursor: pointer;
  box-shadow: 12px 12px 30px rgba(0,0,0,0.5);
  position: relative;
  transition: transform 0.3s;
}

.caderno:hover {
  transform: scale(1.05);
}

.caderno::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  width: 20px;
  height: 100%;
  background: #5a3722;
  border-top-left-radius: 15px;
  border-bottom-left-radius: 15px;
}

.caderno::after {
  content: "Diário de Robótica";
  position: absolute;
  top: 50%;
  left: 55%;
  transform: translate(-50%, -50%);
  color: #fdf5e6;
  font-size: 26px;
  text-align: center;
  padding: 10px;
  line-height: 1.3;
  font-family: 'Pacifico', cursive;
  text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
}

#diario {
  display: none;
  width: 100%;
  height: 100vh;
  background: #fdfaf3;
  padding: 40px;
  position: relative;
}

.pagina {
  width: 100%;
  height: 100%;
  background: #fffdf7;
  border-radius: 10px;
  padding: 30px;
  padding-right: 40px;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
  font-size: 20px;
  line-height: 1.6;
  overflow-y: auto; 
}

.pagina h2 {
  margin-bottom: 10px;
}

.pagina h3 {
  margin-top: 15px;
  color: #5a3722;
}

.pagina ul {
  margin-left: 20px;
  margin-top: 10px;
}

.btn {
  position: absolute;
  bottom: 20px;
  font-size: 24px;
  cursor: pointer;
  background: #ddd;
  padding: 10px 15px;
  border-radius: 8px;
}

#voltar { left: 20px; }
#anterior { right: 80px; }
#proximo { right: 20px; }

</style>
</head>

<body>

<div id="home">
  <div class="descricao">
    Este diário é referente às aulas de robótica.<br><br>
    Aqui estão registrados experimentos, práticas, aprendizados e fotos dos projetos desenvolvidos ao longo das aulas.
  </div>

  <div class="clique">Clique aqui</div>
  <div class="seta">⬇</div>

  <div class="caderno" onclick="abrirDiario()"></div>
</div>

<div id="diario">
  <div class="pagina" id="conteudo"></div>

  <div id="voltar" class="btn" onclick="voltar()">⬅</div>
  <div id="anterior" class="btn" onclick="paginaAnterior()">◀</div>
  <div id="proximo" class="btn" onclick="proximaPagina()">▶</div>
</div>

<script>
let paginaAtual = 0;

const paginas = [

`
<h2>Aula 1</h2>
<p>
(SEU TEXTO ORIGINAL DA AULA 1 AQUI - mantido igual)
</p>
`,

`
<h2>Aula 2</h2>

<p>IMAGENS GERADAS COM IA</p>

<img src="imagem1.jpg" style="width:100%; margin-top:15px;">
<img src="imagem2.jpg" style="width:100%; margin-top:15px;">
<img src="imagem3.jpg" style="width:100%; margin-top:15px;">
<img src="imagem4.jpg" style="width:100%; margin-top:15px;">
<img src="imagem5.jpg" style="width:100%; margin-top:15px;">

<p>
As imagens representam as etapas do desenvolvimento do projeto e a montagem dos circuitos realizados em sala.
</p>
`,

`
<h2>Aula 3</h2>

<h3>🌾 Agricultura</h3>
<p><b>Malefícios:</b></p>
<ul>
  <li>Concentração de Renda</li>
  <li>Redução da Biodiversidade</li>
  <li>Desemprego Estrutural</li>
</ul>

<p><b>Benefícios:</b></p>
<ul>
  <li>Produtividade</li>
  <li>Economia</li>
  <li>Planejamento</li>
</ul>

<h3>🛡️ Defesa e Segurança</h3>
<ul>
  <li>Monitoramento e ciberdefesa</li>
  <li>Autonomia letal e riscos éticos</li>
</ul>

<h3> Serviços Públicos</h3>
<ul>
  <li>Automação e eficiência</li>
  <li>Viés algorítmico e riscos</li>
</ul>

<h3>👤 Cidadania</h3>
<ul>
  <li>Acessibilidade e inclusão</li>
  <li>Vigilância e manipulação</li>
</ul>
`,

`
<h2>Aula 4</h2>

<h3>Agricultura</h3>
<ul>
  <li>Concentração de Renda...</li>
  <li>Redução da Biodiversidade...</li>
  <li>Desemprego Estrutural...</li>
</ul>

<h3>Segurança e Defesa</h3>
<ul>
  <li>Autonomia Letal...</li>
  <li>Vieses de Identificação...</li>
  <li>Escala de Conflitos...</li>
</ul>

<h3>Serviços Públicos</h3>
<ul>
  <li>Viés Algorítmico...</li>
  <li>Desumanização...</li>
  <li>Vazamento de Dados...</li>
</ul>

<h3>Cidadania</h3>
<ul>
  <li>Vigilância de Massa...</li>
  <li>Manipulação de Opinião...</li>
  <li>Exclusão Digital...</li>
</ul>
`
];

function abrirDiario() {
  document.getElementById("home").style.display = "none";
  document.getElementById("diario").style.display = "block";
  mostrarPagina();
}

function voltar() {
  document.getElementById("diario").style.display = "none";
  document.getElementById("home").style.display = "flex";
}

function mostrarPagina() {
  document.getElementById("conteudo").innerHTML = paginas[paginaAtual];
}

function proximaPagina() {
  if (paginaAtual < paginas.length - 1) {
    paginaAtual++;
    mostrarPagina();
  }
}

function paginaAnterior() {
  if (paginaAtual > 0) {
    paginaAtual--;
    mostrarPagina();
  }
}
</script>

</body>
</html>
